# .github/workflows/validate.yml
# Simple validation - NO ANSIBLE INSTALLATION

name: Validate Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Project Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List project structure
        run: |
          echo "========================================"
          echo "PROJECT STRUCTURE"
          echo "========================================"
          ls -la
          echo ""
          echo "Main directories:"
          ls -d */
      
      - name: Verify directories exist
        run: |
          echo ""
          echo "========================================"
          echo "DIRECTORY VALIDATION"
          echo "========================================"
          
          dirs=(
            "00_Project_Overview"
            "01_Requirements"
            "02_Infrastructure_Inventory"
            "03_Salt_Analysis"
            "04_Ansible_Design"
            "05_Conversion_Scripts"
            "06_Ansible_Roles"
            "07_Ansible_Playbooks"
            "08_Validation"
            "09_Deployment"
            "10_Rollback"
            "12_Handover"
          )
          
          for dir in "${dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ $dir"
            else
              echo "❌ $dir MISSING"
              exit 1
            fi
          done
      
      - name: Count files
        run: |
          echo ""
          echo "========================================"
          echo "FILE STATISTICS"
          echo "========================================"
          
          total_files=$(find . -type f | wc -l)
          echo "Total files: $total_files"
          
          role_count=$(find 06_Ansible_Roles -name "main.yml" 2>/dev/null | wc -l)
          echo "Ansible roles: $role_count"
          
          playbook_count=$(find 07_Ansible_Playbooks -name "*.yml" 2>/dev/null | wc -l)
          echo "Playbooks: $playbook_count"
      
      - name: Final status
        run: |
          echo ""
          echo "========================================"
          echo "✅ VALIDATION PASSED"
          echo "========================================"
          echo ""
          echo "Salt to Ansible Migration Project"
          echo "Max Planck Institute - Halle"
          echo ""
          echo "Status: Ready"
          echo "========================================"
