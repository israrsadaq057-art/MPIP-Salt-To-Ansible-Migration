# .github/workflows/validate.yml
# GitHub Actions CI/CD Pipeline for Salt to Ansible Migration

name: Validate Ansible Migration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-syntax:
    name: Validate Ansible Syntax
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible ansible-lint
          ansible --version
      
      - name: Validate all playbooks syntax
        run: |
          for playbook in 07_Ansible_Playbooks/Production/*.yml; do
            echo "Validating $playbook..."
            ansible-playbook $playbook --syntax-check
          done

  validate-roles:
    name: Validate Ansible Roles Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check role directories
        run: |
          required_roles="Common Core/ntp Core/ssh Core/users Storage/zfs Storage/nfs HPC/slurm_controller HPC/slurm_compute GPU/nvidia GPU/cuda Kubernetes/kubeadm Docker/engine Monitoring/icinga2"
          for role in $required_roles; do
            if [ -d "06_Ansible_Roles/$role/tasks" ]; then
              echo "✅ $role/tasks exists"
            else
              echo "❌ $role/tasks missing"
              exit 1
            fi
          done

  validate-inventory:
    name: Validate Inventory File
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check inventory file exists
        run: |
          if [ -f "04_Ansible_Design/Inventory/production_hosts.yml" ]; then
            echo "✅ Inventory file exists"
            grep -c "ansible_host" 04_Ansible_Design/Inventory/production_hosts.yml
          else
            echo "❌ Inventory file missing"
            exit 1
          fi

  validate-files:
    name: Validate All Required Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check required files
        run: |
          files="00_Project_Overview/README.md 04_Ansible_Design/Inventory/production_hosts.yml 07_Ansible_Playbooks/Production/00-site.yml 08_Validation/Test_Scripts/validate_all.sh"
          for file in $files; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install yamllint
        run: sudo apt install -y yamllint
      
      - name: Validate YAML files
        run: |
          find . -name "*.yml" -o -name "*.yaml" | grep -v ".github" | while read file; do
            echo "Checking $file"
            yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: enable}}" "$file"
          done

  summary:
    name: Validation Summary
    needs: [validate-syntax, validate-roles, validate-inventory, validate-files, validate-yaml]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Print summary
        run: |
          echo "========================================"
          echo "✅ ALL VALIDATIONS COMPLETE"
          echo "========================================"
          echo "Project: Salt to Ansible Migration"
          echo "Status: Validated"
