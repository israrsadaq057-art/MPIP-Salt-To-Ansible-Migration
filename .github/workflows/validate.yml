# .github/workflows/validate.yml
# Simplified workflow - no ansible.cfg dependency

name: Validate Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check directory structure
        run: |
          echo "========================================"
          echo "PROJECT STRUCTURE VALIDATION"
          echo "========================================"
          
          required_dirs=(
            "00_Project_Overview"
            "01_Requirements"
            "02_Infrastructure_Inventory"
            "03_Salt_Analysis"
            "04_Ansible_Design"
            "05_Conversion_Scripts"
            "06_Ansible_Roles"
            "07_Ansible_Playbooks"
            "08_Validation"
            "09_Deployment"
            "10_Rollback"
            "12_Handover"
          )
          
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "? $dir"
            else
              echo "? $dir MISSING"
              exit 1
            fi
          done
          
          echo ""
          echo "? All directories present"
      
      - name: Check Ansible roles
        run: |
          echo ""
          echo "========================================"
          echo "ANSIBLE ROLES VALIDATION"
          echo "========================================"
          
          if [ -d "06_Ansible_Roles/Common/tasks" ]; then
            echo "? Common role exists"
          else
            echo "? Common role missing"
            exit 1
          fi
          
          if [ -d "06_Ansible_Roles/Core/ntp/tasks" ]; then
            echo "? NTP role exists"
          fi
          
          echo ""
          echo "? Roles validation complete"
      
      - name: Final status
        run: |
          echo ""
          echo "========================================"
          echo "? VALIDATION PASSED"
          echo "========================================"
          echo ""
          echo "Project: Salt to Ansible Migration"
          echo "Status: Ready for deployment"
          echo "========================================"