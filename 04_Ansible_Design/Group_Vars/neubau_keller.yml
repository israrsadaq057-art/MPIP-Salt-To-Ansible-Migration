# neubau_keller.yml – Basement storage
# 119 servers (storage + backup)

---
location: "Basement"
humidity_sensitive: true

zfs_pools:
  - name: tank
    disks: 24
    raid: raidz2
  - name: backup
    disks: 12
    raid: mirror

nfs_exports:
  - path: /tank/research
    clients: 10.20.0.0/16
    options: rw,sync,no_subtree_check
  - path: /tank/hpc
    clients: 10.20.10.0/24
    options: rw,sync,no_root_squash

backup_schedule: "0 2 * * *"
backup_retention_days: 90

tape_library: true
