# firewall/tasks/main.yml
# Based on our Salt iptables config

- name: Install iptables packages
  apt:
    name:
      - iptables
      - iptables-persistent
    state: present
  when: ansible_os_family == "Debian"

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Flush existing rules
  iptables:
    chain: "{{ item }}"
    flush: yes
  loop:
    - INPUT
    - FORWARD
    - OUTPUT

- name: Set default policies
  iptables:
    chain: INPUT
    policy: DROP
  - name: Set FORWARD default policy
    iptables:
      chain: FORWARD
      policy: DROP
  - name: Set OUTPUT default policy
    iptables:
      chain: OUTPUT
      policy: ACCEPT

- name: Allow loopback
  iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT

- name: Allow established connections
  iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT

- name: Allow SSH from admin networks
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 22
    source: "{{ item }}"
    jump: ACCEPT
  loop: "{{ firewall_allowed_ssh }}"

- name: Allow HTTP/HTTPS for web servers
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
  loop:
    - 80
    - 443
  when: "'web' in group_names"

- name: Save iptables rules
  command: iptables-save > /etc/iptables/rules.v4
  when: ansible_os_family == "Debian"
