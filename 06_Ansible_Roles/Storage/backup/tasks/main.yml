# backup/tasks/main.yml
# Borg backup configuration

- name: Install borgbackup
  apt:
    name: borgbackup
    state: present

- name: Create backup directory
  file:
    path: "{{ backup_path }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Initialize borg repository
  command: borg init --encryption=repokey-blake2 {{ backup_path }}/{{ inventory_hostname }}
  environment:
    BORG_PASSPASSPHRASE: "{{ borg_passphrase }}"

- name: Deploy backup script
  template:
    src: backup.sh.j2
    dest: /usr/local/bin/backup.sh
    mode: '0755'

- name: Add cron job for daily backup
  cron:
    name: "Daily backup"
    minute: 0
    hour: 2
    job: "/usr/local/bin/backup.sh"
